<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept Mateba Terms of Use</title>
  <meta name="description" content="Quickly review and accept Mateba's Terms of Use before continuing with your order." />

  <style>
    :root {
      --bg: #F8F5EF;
      --text: #171717;
      --muted: #55504A;
      --accent: #B9915A;
      --border: #DED6CA;
      --cta-bg: #101010;
      --card: #FFFFFF;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(900px, calc(100% - 2rem));
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: rgba(248, 245, 239, 0.95);
      padding: 1rem 0;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      height: 56px;
      max-width: 220px;
      width: auto;
      object-fit: contain;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 3rem 0;
    }

    .card {
      width: 100%;
      max-width: 760px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      padding: clamp(1.25rem, 3vw, 2rem);
    }

    h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0 0 1rem;
    }

    p {
      margin: 0 0 1.5rem;
      color: var(--muted);
      max-width: 65ch;
    }

    .terms-link {
      display: inline-block;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 1.25rem;
    }

    .cta {
      border: 0;
      background: var(--cta-bg);
      color: #fff;
      padding: 0.9rem 1.25rem;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
    }

    .cta:hover { background: #000; }

    .secondary-link {
      display: inline-block;
      margin-top: 1rem;
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 700px) {
      .logo { height: 48px; }
      nav { flex-wrap: wrap; }
      main { padding: 2.5rem 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <nav>
        <a href="/index.html" aria-label="Mateba Home">
          <img class="logo" src="/assets/logos/mateba-logo-primary.jpg" alt="Mateba logo" loading="eager" />
        </a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="card">
        <h1>Accept Mateba Terms of Use</h1>
        <p>Before we continue with your Mateba order, please read and accept the Terms of Use.</p>

        <a class="terms-link" href="/terms/">Read full Terms of Use</a>

        <div>
          <button id="accept-btn" class="cta" type="button">I accept the Terms of Use</button>
        </div>

        <a class="secondary-link" href="/index.html">Return to Home</a>
      </section>
    </div>
  </main>

  <script>
    const acceptButton = document.getElementById('accept-btn');

    acceptButton.addEventListener('click', () => {
      const timestamp = new Intl.DateTimeFormat('en-ZA', {
        timeZone: 'Africa/Johannesburg',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      }).format(new Date());

      const message = [
        "I accept Mateba's Terms of Use.",
        'Terms version: 10 June 2026',
        'Terms URL: https://mateba.co.za/terms/',
        'Acceptance page: https://mateba.co.za/accept-terms/',
        `Acceptance time generated by website: ${timestamp}`,
        'I confirm that I have read and accepted the Terms of Use before placing or continuing with my Mateba order.'
      ].join('\n');

      const whatsappUrl = `https://wa.me/27637831350?text=${encodeURIComponent(message)}`;
      window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
    });
  </script>
</body>
</html>
