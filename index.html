<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mateba – Life, in Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 700px;
      padding: 20px;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
      color: #cccccc;
    }
    .cta {
      margin-top: 30px;
    }
    input {
      padding: 10px;
      width: 70%;
      border: none;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #ffffff;
      color: #000;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mateba</h1>
    <p>Life, in Music.</p>
    <p>We turn real human stories into deeply personal songs.</p>

    <div class="cta">
      <p><strong>Launching soon.</strong></p>
      <input type="email" placeholder="Enter your email">
      <br>
      <button>Notify Me</button>
    </div>
  </div>
</body>
</html>
