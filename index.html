<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mateba – Life, in Music</title>
  <meta name="description" content="Mateba creates personalised songs from real life stories. A premium, meaningful gift for birthdays, anniversaries, memorials and life moments." />

  <style>
    :root {
      --bg: #fbf7f0;
      --surface: #ffffff;
      --surface-soft: #f3eadc;
      --surface-warm: #fffaf2;
      --border: rgba(54, 38, 22, 0.12);
      --text: #23180f;
      --muted: #66584a;
      --soft: #958474;
      --gold: #b88938;
      --gold-soft: #d9b66f;
      --shadow: 0 22px 58px rgba(84, 56, 24, 0.13);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(217, 182, 111, 0.26), transparent 34rem),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.9), transparent 30rem),
        var(--bg);
      color: var(--text);
      line-height: 1.65;
    }

    a { color: inherit; }
    .page { overflow: hidden; }
    .wrap { width: min(1120px, calc(100% - 40px)); margin: 0 auto; }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 24px 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 13px;
      font-weight: 800;
    }

    .brand span {
      color: var(--soft);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
    }

    .nav-link {
      color: var(--muted);
      font-size: 14px;
      text-decoration: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 56px;
      align-items: center;
      min-height: 720px;
      padding: 48px 0 86px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: var(--gold);
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      max-width: 780px;
      margin-bottom: 24px;
      font-size: clamp(44px, 7vw, 82px);
      line-height: 0.98;
      letter-spacing: -0.06em;
    }

    .lead {
      max-width: 650px;
      margin-bottom: 34px;
      color: var(--muted);
      font-size: clamp(19px, 2vw, 23px);
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 22px;
      border-radius: 999px;
      background: #25D366;
      color: #ffffff;
      font-size: 15px;
      font-weight: 850;
      text-decoration: none;
      border: none;
      box-shadow: 0 16px 36px rgba(37, 211, 102, 0.25);
    }

    .button:hover {
      background: #1ebe5d;
    }

    .microcopy {
      max-width: 300px;
      color: var(--soft);
      font-size: 14px;
      line-height: 1.45;
    }

    .hero-card { /* unchanged */ }
  </style>
</head>
<body></body>
</html>
